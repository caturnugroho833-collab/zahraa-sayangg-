<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>happy birthday 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    text-align:center;
}

.container{
    padding:40px 20px;
    animation:fade 2s ease;
}

h1{
    font-size:42px;
    margin-top:70px;
    margin-bottom:20px;
}

#typing{
    max-width:750px;
    margin:auto;
    line-height:1.9;
    font-size:18px;
    color:#d7d7d7;
    white-space:pre-line;
    min-height:250px;
}

button{
    margin-top:30px;
    padding:13px 28px;
    border:none;
    border-radius:30px;
    background:white;
    color:black;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.gallery{
    margin-top:60px;
}

.gallery img{
    width:250px;
    height:320px;
    object-fit:cover;
    border-radius:20px;
    margin:10px;
    transition:0.4s;
    box-shadow:0 0 20px rgba(255,255,255,0.1);
}

.gallery img:hover{
    transform:scale(1.05);
}

.last{
    margin-top:90px;
    margin-bottom:60px;
    font-size:24px;
    color:white;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* efek bintang */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
    overflow:hidden;
}

.stars span{
    position:absolute;
    display:block;
    width:2px;
    height:2px;
    background:white;
    animation:animate 5s linear infinite;
    opacity:0.8;
}

@keyframes animate{
    0%{
        transform:translateY(0px);
        opacity:0;
    }

    50%{
        opacity:1;
    }

    100%{
        transform:translateY(100vh);
        opacity:0;
    }
}
.hearts{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    overflow:hidden;
    z-index:-1;
}

.hearts span{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:fall linear infinite;
    top:-10%;
}

@keyframes fall{
    0%{
        transform:translateY(-10vh);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>
<div class="hearts">
    <span style="left:5%; animation-duration:7s;">❤</span>
    <span style="left:15%; animation-duration:10s;">❤</span>
    <span style="left:25%; animation-duration:8s;">❤</span>
    <span style="left:40%; animation-duration:12s;">❤</span>
    <span style="left:55%; animation-duration:9s;">❤</span>
    <span style="left:70%; animation-duration:11s;">❤</span>
    <span style="left:85%; animation-duration:7s;">❤</span>
</div>
<div class="stars">
    <span style="left:10%; animation-delay:0s;"></span>
    <span style="left:20%; animation-delay:1s;"></span>
    <span style="left:35%; animation-delay:2s;"></span>
    <span style="left:50%; animation-delay:3s;"></span>
    <span style="left:70%; animation-delay:1s;"></span>
    <span style="left:85%; animation-delay:4s;"></span>
</div>

<div class="container">

<h1>happy birthday sayang 🤍</h1>

<p id="typing"></p>

<button onclick="playMusic()">play music 🎵</button>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<div class="gallery">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
</div>

<div class="last">
    thank you for existing 🤍
</div>

</div>

<script>

const text = `happy birthday sayang 🤍

makasih ya udah hadir sejauh ini dan bahkan menjadi bagian dari hidup akuu

mungkin aku belum jadi orang paling sempurna buat kamuu,
tapi aku selalu bersyukur bisa kenal,
ketawa,
cerita,
dan punya banyak momen sama kamu sampai sekarang.

semoga di umur yang baru ini,
semua hal baik pelan-pelan dateng ke hidup kamuu yaa sayangg

semoga hati kamuu selalu tenang,
langkah kamuu selalu dimudahin,
dan senyum kamuu nggak banyak hilang lagi ya.

dan kalau nanti hidup lagi berat,
akuu harap selalu ada alasan kecil buat bikin kamu tetap kuat.

i'm really happy to know you 🤍`;

let i = 0;

function typingEffect(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect,40);
    }
}

typingEffect();

function playMusic(){
    document.getElementById("music").play();
}

</script>

</body>
</html>
